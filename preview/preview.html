<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Label Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .countdown {
      font-size: 12px;
      color: #888;
    }

    .countdown span {
      color: #2563eb;
      font-weight: 600;
    }

    .btn-close {
      background: #333;
      border: none;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      padding: 4px 10px;
      cursor: pointer;
    }

    .btn-close:hover { background: #444; color: #fff; }

    .image-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .image-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .pdf-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #888;
    }

    .pdf-icon { font-size: 48px; }

    .label-info {
      padding: 8px 14px 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
      flex-shrink: 0;
    }

    .progress-bar {
      height: 3px;
      background: #2563eb;
      transition: width linear;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">New Label</span>
    <span class="countdown">Closing in <span id="seconds">—</span>s</span>
    <button class="btn-close" id="btn-close">Dismiss</button>
  </div>
  <div class="progress-bar" id="progress-bar" style="width:100%"></div>
  <div class="image-area" id="image-area">
    <div class="pdf-placeholder" id="pdf-placeholder" style="display:none">
      <div class="pdf-icon">📄</div>
      <p>PDF label received</p>
    </div>
    <img id="label-img" src="" alt="Label preview" style="display:none" />
  </div>
  <div class="label-info" id="label-info"></div>
  <script src="preview.js"></script>
</body>
</html>
